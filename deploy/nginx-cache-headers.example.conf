# Voeg toe aan je nginx server {} block voor devaimlabs.com
# (PageSpeed cache TTL — statische assets niet via PHP)

location ^~ /build/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

location ~* \.(webp|jpg|jpeg|png|gif|ico|css|js|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
}
